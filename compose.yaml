services:
  currency-api:
    image: 9rock/currency-api:production-v2
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currency-api
    platform: linux/amd64

    ports:
      - "2050:2050"
    env_file:
      - .env
    environment:
      - ORIGIN_URL=${ORIGIN_URL}
      - CURRENCY_API_URL=${CURRENCY_API_URL}
      - ENVIRONMENT=${ENVIRONMENT}

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2050/health || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 20s
    restart: unless-stopped
